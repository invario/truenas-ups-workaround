name: Shellcheck
on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

jobs:
  ShellCheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Run ShellCheck
      uses: ludeeus/action-shellcheck@master
      
  shfmt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install shfmt
      uses: mfinelli/setup-shfmt@v4
    - name: Check Formatting
      run: shfmt -d -i 2 .
